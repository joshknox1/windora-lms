# Make Pandora's HE-AAC (.mp4) play on any Squeezebox by transcoding to FLAC.
#
# The catch: squeezelite (e.g. piCorePlayer) advertises "aac" support, so LMS
# streams the raw AAC straight through ("aac aac" native passthrough) — but it
# can't actually decode Pandora's HE-AAC/MP4 and reports "Decoder does not
# support file format". So we override the aac/mp4 -> aac passthrough rules with
# a binary that doesn't exist (disabling them), which forces LMS to use the
# aac/mp4 -> flac transcode below. ffmpeg auto-detects the real content from the
# pipe regardless of the source label. Requires ffmpeg on the LMS host.
#
# Capability flags: I = read from a pipe (stdin); F = read a file. For remote
# streams LMS pipes the audio in and substitutes $FILE$ with "-".

aac aac * *
	# I
	[windora-disable-aac-passthrough]

mp4 aac * *
	# I
	[windora-disable-aac-passthrough]

aac flc * *
	# IF
	[ffmpeg] -nostdin -v 0 -i $FILE$ -c:a flac -compression_level 0 -f flac -

mp4 flc * *
	# IF
	[ffmpeg] -nostdin -v 0 -i $FILE$ -c:a flac -compression_level 0 -f flac -
